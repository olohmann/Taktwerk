name: Taktwerk
options:
  bundleIdPrefix: com.olohmann
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Taktwerk:
    type: application
    platform: macOS
    sources:
      - path: Taktwerk
        excludes:
          - "Resources/TaktwerkHelp.help"
      - path: Taktwerk/Resources/TaktwerkHelp.help
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olohmann.Taktwerk
        PRODUCT_NAME: Taktwerk
        INFOPLIST_FILE: Taktwerk/Info.plist
        CODE_SIGN_ENTITLEMENTS: Taktwerk/Taktwerk.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Taktwerk/Taktwerk.entitlements
  TaktwerkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TaktwerkTests
    dependencies:
      - target: Taktwerk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olohmann.TaktwerkTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Taktwerk.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Taktwerk"
        BUNDLE_LOADER: "$(TEST_HOST)"
